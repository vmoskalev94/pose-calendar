services:
  db:
    image: postgres:16-alpine
    container_name: posecalendar-db
    environment:
      POSTGRES_DB: posecalendar
      POSTGRES_USER: posecalendar
      POSTGRES_PASSWORD: posecalendar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: posecalendar-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "prod"
      # Дублируем настройки БД через env, чтобы при необходимости
      # можно было переопределить их без правки yaml
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/posecalendar"
      SPRING_DATASOURCE_USERNAME: "posecalendar"
      SPRING_DATASOURCE_PASSWORD: "posecalendar"
    # При желании можно раскомментировать:
    # restart: on-failure

volumes:
  postgres_data:
